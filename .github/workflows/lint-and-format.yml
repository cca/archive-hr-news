name: Lint and Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# lint and check formatting of python code
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Linter
        run: ruff check entity_extractor/
      - name: Run Ruff Formatter
        run: ruff format --check --diff entity_extractor/
